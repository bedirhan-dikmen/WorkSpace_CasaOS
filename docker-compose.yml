version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: fastapi_db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - api_network

  web:
    build: .
    image: fastapi:latest
    container_name: fastapi_app
    restart: always
    ports:
      - "8010:8000"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    depends_on:
      - db
    networks:
      - api_network
    #  CASAOS ARAYÜZÜNÜ OTOMATİK DÜZELTEN SİHİRLİ SATIRLAR:

volumes:
  mysql_data:

networks:
  api_network:
    driver: bridge
